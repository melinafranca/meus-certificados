<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Melina França</title>
    <!-- Referência ao seu novo arquivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header com cor de fundo personalizada -->
    <header class="site-header">
        <div class="header-content">
            <h1 class="header-title">
                Melina <span>França</span>
            </h1>
            <p class="header-subtitle">
                Cloud Computing | AWS | Inteligência Artificial | Análise de Dados
            </p>
            <p class="header-desc">
                Histórico acadêmico e de desenvolvimento profissional
            </p>
        </div>
    </header>

    <!-- Barra de Filtros e Busca Limpa -->
    <section class="filters-section">
        <div class="filters-container">
            <div class="search-box">
                <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="input-busca" class="search-input" placeholder="Pesquisar certificado, tag ou instituição...">
            </div>
            
            <div class="filters-dropdowns">
                <select id="select-ordem" class="filter-select">
                    <option value="reversa">Mais Recentes Primeiro</option>
                    <option value="cronologica">Mais Antigos Primeiro</option>
                </select>
                <!-- NOVO FILTRO DE ANO AQUI -->
                <select id="select-ano" class="filter-select">
                    <option value="">Todos os Anos</option>
                </select>
                <!-- FILTRO DE INSTITUIÇÃO -->
                <select id="select-instituicao" class="filter-select">
                    <option value="">Todas as Instituições</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Grid / Linha de Tempo -->
    <main class="main-content">
        <div id="grid-certificados" class="cert-grid">
            <!-- Os cards serão inseridos dinamicamente aqui -->
        </div>
        
        <!-- Estado vazio -->
        <div id="empty-state" class="empty-state hidden">
            <div class="empty-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h3>Nenhum resultado encontrado</h3>
            <p>Tente ajustar os filtros ou os termos da sua pesquisa.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p>© 2026 • Melina França</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
